services:
  web:
    image: nginx:alpine
    ports:
      - "80"
    networks:
      - app
    volumes:
      - web-cache:/cache

  worker:
    image: busybox:1.36
    command: ["sh", "-c", "echo worker-ready && sleep 300"]
    networks:
      - app
    volumes:
      - worker-data:/data

networks:
  app:

volumes:
  web-cache:
  worker-data:
